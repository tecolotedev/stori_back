<!-- template.html -->
<!DOCTYPE html>
<html>
    <head>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&display=swap');
            * {
                border:0px;
                margin: 0px;
                font-family: 'Roboto', sans-serif;

            }
            #img-stori-logo{
                height: 80px;
            }
            #wrapper{
                padding: 20px
            }

            body{
                background: #003a40;
            }
            

            #greeting-container, #button-container{
                display: flex;
                justify-content: center;
                color:white
            }
            #table-container{
                display: flex;
                justify-content: center;
            }

            #report {
                font-family: Arial, Helvetica, sans-serif;
                border-collapse: collapse;
                width: 75%;
            }
         
            #report tr th{
                background: #00d180;
            }

            #report td, #report th {
                border: 1px solid #ddd;
                padding: 8px;
            }

            #report tr:nth-child(even){background-color: #f2f2f2;}
            #report tr:nth-child(odd){background-color: white;}

            #report th {
                padding-top: 12px;
                padding-bottom: 12px;
                text-align: left;
                background-color: #003a40;;
                color: white;
            }
            h3 {
                color: white;
            }
            h2{
                text-align: center;
                color: white;
            }

        </style>
    </head>
    <body>
        <div>
            <img id="img-stori-logo" src="https://res.cloudinary.com/dfl1tke7p/image/upload/f_auto,q_auto/tyzmnjksxy6usxgpzpoe" alt="logo stori" />
        </div>
        <div id="wrapper">
                
            <h2>Last report for your account with id: "{{.Id}}"</h2>
            
            <div id="table-container">
                <table id="report">
                    <tr>
                        <th>Date</th>
                        <th>Transaction</th>
                        <th>Reason</th>
                    </tr>
                    {{range .LastRecords}}
                        <tr>
                            <td>{{.Date}}</td>
                            <td>{{.Transaction}}</td>
                            <td>{{.Reason}}</td>
                        </tr>
                    {{end}}
                </table>
            </div>
            <h3>Last Balance: ${{.Balance}}</h3>

            <h2>Full summary per month</h2>
            <div id="table-container">
                <table id="report">
                    <tr>
                        <th>Month</th>
                        <th>Type</th>
                        <th>Average</th>
                    </tr>
                    {{range .AllTransfers}}
                        <tr>
                            <td>{{.Month}}</td>
                            <td>{{.Type}}</td>
                            <td>{{.Average}}</td>
                        </tr>
                    {{end}}
                </table>
            </div>
        </div>
    </body>
</html>
