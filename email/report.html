<!-- template.html -->
<!DOCTYPE html>
<html>
    <head>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&display=swap');
            * {
                border:0px;
                margin: 0px;
                font-family: 'Roboto', sans-serif;

            }
            #img-stori-logo{
                height: 80px;
            }

            body{
                background: #003a40;
            }
            

            #greeting-container, #button-container{
                display: flex;
                justify-content: center;
                color:white
            }
            #table-container{
                display: flex;
                justify-content: center;
            }

            #report {
                font-family: Arial, Helvetica, sans-serif;
                border-collapse: collapse;
                width: 75%;
            }
         
            #report tr th{
                background: #00d180;
            }

            #report td, #report th {
                border: 1px solid #ddd;
                padding: 8px;
            }

            #report tr:nth-child(even){background-color: #f2f2f2;}
            #report tr:nth-child(odd){background-color: white;}

            #report th {
                padding-top: 12px;
                padding-bottom: 12px;
                text-align: left;
                background-color: #003a40;;
                color: white;
            }
            h3 {
                color: white;
            }

        </style>
    </head>
    <body>
        <div>
            <img id="img-stori-logo" src="https://res.cloudinary.com/dfl1tke7p/image/upload/f_auto,q_auto/tyzmnjksxy6usxgpzpoe" alt="logo stori" />
        </div>
        <div id="greeting-container">
            <p>Last report for your account: </p>
        </div>
        <div id="table-container">
            <table id="report">
                <tr>
                    <th>Date</th>
                    <th>Transaction</th>
                    <th>Reason</th>
                </tr>
                {{range .Records}}
                    <tr>
                        <td>{{.Date}}</td>
                        <td>{{.Transaction}}</td>
                        <td>{{.Reason}}</td>
                    </tr>
                {{end}}
            </table>
        </div>
        <h3>Last Balance: ${{.Balance}}</h3>
    </body>
</html>
